version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema:  "db/migrations"
    gen:
      go:
        package:              "dbgen"
        out:                  "internal/adapters/repositories/generated"
        emit_interface:       true
        emit_json_tags:       true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:  "github.com/google/uuid.UUID"
          - db_type: "numeric"
            go_type:  "github.com/shopspring/decimal.Decimal"
