version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     shopuser
      POSTGRES_PASSWORD: shoppass
      POSTGRES_DB:       shopgo
    command: >
      postgres
        -c max_connections=100
        -c shared_buffers=128MB
        -c effective_cache_size=512MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopuser -d shopgo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations:ro
    entrypoint: >
      sh -c "
        psql postgres://shopuser:shoppass@postgres:5432/shopgo?sslmode=disable
          -f /migrations/000001_schema.up.sql
          -f /migrations/000002_indexes.up.sql
          -f /migrations/000003_triggers.up.sql
        echo 'Migraciones aplicadas'
      "
    restart: on-failure

  api:
    build: .
    ports:
      - "8082:8080"
    env_file: .env.docker
    volumes:
      - ./deploy/secrets:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  seed:
    build: .
    entrypoint: []
    command: ["sh", "-c", "echo 'seed skipped — run manually if needed'"]
    env_file: .env.docker
    volumes:
      - ./deploy/secrets:/secrets:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    profiles: ["seed"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./deploy/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8888:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
