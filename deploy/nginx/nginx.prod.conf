events { worker_connections 4096; }
http {
    limit_req_zone $binary_remote_addr zone=api:20m  rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    upstream shopgo { server api:8080; keepalive 32; }

    server {
        listen 80; server_name _; return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2; server_name tudominio.com;

        ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.stripe.com";

        location /api/v1/auth/ { limit_req zone=auth burst=5 nodelay; proxy_pass http://shopgo; }
        location /api/          { limit_req zone=api  burst=20 nodelay; proxy_pass http://shopgo; proxy_http_version 1.1; proxy_set_header Connection ""; }
        location /ws            { proxy_pass http://shopgo; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
        location /health        { proxy_pass http://shopgo; access_log off; }
    }
}
