run:
  timeout: 5m
linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - gocritic
    - gosec
    - bodyclose
    - contextcheck
    - sqlclosecheck
linters-settings:
  gosec:
    excludes: [G401, G501]
issues:
  exclude-rules:
    - path: "_test\\.go"
      linters: [gosec, errcheck]
